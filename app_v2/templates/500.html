{% extends "base.html" %}
{% block content %}
  <div class="alert alert-danger" role="alert">
    <h4 class="alert-heading"><i class="bi bi-x-octagon"></i> 500 — Internal server error</h4>
    <p>Something went wrong. Try again — if the problem persists, check the server logs.</p>
    {% if detail %}<hr><p class="mb-0 text-muted">{{ detail }}</p>{% endif %}
    <hr>
    <a href="/" class="btn btn-primary">Return to Overview</a>
  </div>
{% endblock %}
