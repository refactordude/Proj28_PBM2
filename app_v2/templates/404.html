{% extends "base.html" %}
{% block content %}
  <div class="alert alert-warning" role="alert">
    <h4 class="alert-heading"><i class="bi bi-exclamation-triangle"></i> 404 — Page not found</h4>
    <p>The page you requested does not exist.</p>
    {% if detail %}<hr><p class="mb-0 text-muted">{{ detail }}</p>{% endif %}
    <hr>
    <a href="/" class="btn btn-primary">Return to Overview</a>
  </div>
{% endblock %}
